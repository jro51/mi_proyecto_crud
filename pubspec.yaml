name: mi_proyecto_crud
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # --- GESTIÓN DE ESTADO Y CONTROLADORES ---
  flutter_bloc: ^8.1.3          # Gestor de estado basado en eventos
  equatable: ^2.0.5

  dio: ^5.4.0

  flutter_secure_storage: ^9.0.0

  # --- INTELIGENCIA ARTIFICIAL ---
  google_generative_ai: ^0.4.0  # Paquete oficial de Google para usar Gemini

  # --- MULTIMEDIA Y VOZ ---
  speech_to_text: ^7.0.0        # Captura y traduce la voz a texto en tiempo real
  flutter_tts: ^4.1.0           # Permite que la IA te hable en voz alta

  # --- VARIABLES DE ENTORNO ---
  flutter_dotenv: ^5.1.0        # Para leer tu API Key de forma segura

  # --- SERVICIOS DE FIREBASE ---
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # --- REGISTRO DE ASSETS ---
  assets:
    - assets/images/brawlers/
    - .env